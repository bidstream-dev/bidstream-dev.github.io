<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BidStream Projects</title>
  <link rel="icon" type="image/svg+xml" href="assets/bidstream-favicon.svg" />
  <link rel="stylesheet" href="css/bootstrap.min.css" />

  <style>
    :root {
      --bg: #ece8e2;
      --panel: #ffffff;
      --ink: #17283d;
      --muted: #5d728b;
      --line: #cfdae7;
      --blue: #274472;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    .shell {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 18px 46px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 2px 8px rgba(18, 39, 63, 0.05);
      margin-bottom: 14px;
    }

    .wordmark {
      height: 24px;
      width: auto;
      display: block;
    }

    .back {
      color: #355a8f;
      font-size: 0.84rem;
      font-weight: 600;
      text-decoration: none;
    }

    .heading {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 18px 16px;
      margin-bottom: 12px;
    }

    .heading h1 {
      margin: 0 0 4px;
      color: #1f3554;
      font-size: 1.36rem;
      font-weight: 700;
    }

    .heading p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .project-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(18, 39, 63, 0.04);
    }

    .project-title {
      margin: 0 0 10px;
      font-size: 1.08rem;
      font-weight: 700;
      color: #1f3554;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-item {
      border: 1px solid #d9e2ee;
      border-radius: 10px;
      background: #f9fbfe;
      padding: 8px 9px;
    }

    .meta-label {
      margin: 0 0 2px;
      color: #63768e;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .meta-value {
      margin: 0;
      color: #274472;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      border-radius: 9px;
      font-size: 0.86rem;
      font-weight: 700;
      padding: 7px 13px;
    }

    @media (max-width: 900px) {
      .meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .meta { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <img src="assets/bidstream-logo.svg" alt="BidStream" class="wordmark" />
      <a href="index.html" class="back">Back to Landing</a>
    </header>

    <section class="heading">
      <h1>Projects</h1>
      <p>Select a live project workspace to review progress and continue execution.</p>
    </section>

    <section class="project-card">
      <h2 class="project-title">Demo Project - Boiler Retrofit</h2>
      <div class="meta">
        <div class="meta-item">
          <p class="meta-label">Location</p>
          <p class="meta-value">New York, NY</p>
        </div>
        <div class="meta-item">
          <p class="meta-label">Phase</p>
          <p class="meta-value">Matching</p>
        </div>
        <div class="meta-item">
          <p class="meta-label">Latest Run</p>
          <p class="meta-value">Completed</p>
        </div>
        <div class="meta-item">
          <p class="meta-label">Finalists</p>
          <p class="meta-value">2</p>
        </div>
      </div>
      <a href="project-overview.html" class="btn btn-primary">Open Project</a>
    </section>
  </main>
</body>
</html>
